<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="theme-color" id="theme-color-meta" content="#EDF2FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MarkeApp" />
    <meta name="description" content="Aplicación para gestionar gastos, ingresos y deudas personales" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Fuente Nunito (Pop Azul): títulos y montos 700/800/900 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>MarkeApp - Gestión de Gastos</title>
    <!-- Estilos inline para evitar flash de tema oscuro -->
    <style>
      html, body {
        background-color: #EDF2FF;
        color: #1e2230;
      }
      html.dark, html.dark body {
        background-color: #0e1119;
        color: #ffffff;
      }
    </style>
    <!-- Script inline para aplicar el tema antes de que React monte y evitar flash de tema -->
    <script>
      (function() {
        try {
          var storageKey = 'markeapp-theme';
          var theme = localStorage.getItem(storageKey);
          // Si no hay tema guardado, usar 'light' por defecto (primera vez)
          if (!theme) {
            theme = 'light';
            localStorage.setItem(storageKey, 'light');
          }
          document.documentElement.classList.remove('light','dark');
          document.documentElement.classList.add(theme);
        } catch (e) {
          // Si algo falla, forzar modo claro
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
